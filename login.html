<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IS ONE Login</title>

<style>

body{

    margin:0;

    font-family:Arial,sans-serif;

    background:#0d1117;

    color:#fff;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.box{

    width:320px;

    background:#161b22;

    padding:30px;

    border-radius:15px;

    text-align:center;

}

input{

    width:100%;

    padding:12px;

    margin:10px 0;

    border:none;

    border-radius:8px;

}

button{

    width:100%;

    padding:12px;

    background:#00bfff;

    border:none;

    border-radius:8px;

    color:#fff;

    font-size:16px;

    cursor:pointer;

}

h2{

    color:#00bfff;

}

</style>

</head>

<body>

<div class="box">

<h2>IS ONE Login</h2>

<input type="text" id="phone" placeholder="Phone Number">

<button>Send OTP</button>

<p id="result"></p>

</div>

</body>

</html>
