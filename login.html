<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IS ONE CEO Login</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#0d1117;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:white;

}

.login-box{

width:360px;

background:#161b22;

padding:35px;

border-radius:18px;

box-shadow:0 0 20px rgba(0,191,255,.25);

text-align:center;

}

.logo{

font-size:34px;

margin-bottom:10px;

}

h1{

color:#00BFFF;

margin-bottom:8px;

}

p{

color:#bdbdbd;

margin-bottom:25px;

}

input{

width:100%;

padding:14px;

margin:10px 0;

border:none;

border-radius:10px;

background:#242b36;

color:white;

font-size:16px;

outline:none;

}

button{

width:100%;

padding:14px;

margin-top:15px;

background:#00BFFF;

color:white;

border:none;

border-radius:10px;

font-size:17px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#009acd;

}

.footer{

margin-top:20px;

font-size:13px;

color:#888;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">👑</div>

<h1>IS ONE</h1>

<p>Founder & CEO Login</p>

<input

type="text"

id="username"

placeholder="Username">

<input

type="password"

id="password"

placeholder="Password">

<button onclick="ceoLogin()">

LOGIN

</button>

<div class="footer">

IS ONE Version 1.0

</div>

</div>

<script>

function ceoLogin(){

let username=document.getElementById("username").value;

let password=document.getElementById("password").value;

if(username==="IS ONE CEO" && password==="123456"){

window.location.href="dashboard.html";

}else{

alert("Invalid Username or Password");

}

}

</script>

</body>

</html>
