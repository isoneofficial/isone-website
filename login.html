<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IS ONE Login</title>

<style>

body{

margin:0;

font-family:Arial,sans-serif;

background:#0d1117;

color:#fff;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.box{

width:340px;

background:#161b22;

padding:30px;

border-radius:15px;

text-align:center;

}

input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:8px;

box-sizing:border-box;

}

button{

width:100%;

padding:12px;

margin-top:10px;

background:#00bfff;

border:none;

border-radius:8px;

color:#fff;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#0099cc;

}

h2{

color:#00bfff;

}

#otpBox{

display:none;

}

</style>

</head>

<body>

<div class="box">

<h2>IS ONE Login</h2>

<input

type="text"

id="phone"

placeholder="+8801XXXXXXXXX">

<div id="recaptcha-container"></div>

<button onclick="sendOTP()">

Send OTP

</button>

<div id="otpBox">

<input

type="text"

id="otp"

placeholder="Enter OTP">

<button onclick="verifyOTP()">

Verify OTP

</button>

</div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module" src="login.js"></script>

</body>

</html>
