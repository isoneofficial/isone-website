<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IS ONE Login</title>

<style>

body{

margin:0;

background:#0d1117;

font-family:Arial,sans-serif;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:white;

}

.box{

background:#161b22;

padding:30px;

border-radius:15px;

width:320px;

text-align:center;

}

h2{

color:#00bfff;

}

input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:8px;

font-size:16px;

}

button{

width:100%;

padding:12px;

margin-top:10px;

background:#00bfff;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

a{

color:#00bfff;

text-decoration:none;

}

</style>

</head>

<body>

<div class="box">

<h2>IS ONE Login</h2>

<input

type="email"

id="email"

placeholder="Email Address">

<input

type="password"

id="password"

placeholder="Password">

<button onclick="login()">

Login

</button>

<p>

Don't have an account?

<a href="signup.html">Create Account</a>

</p>

</div>

<script type="module" src="auth.js"></script>

</body>

</html>
